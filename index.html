<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Sharing</title>
    <link rel="stylesheet" href="Styles/global.css">
    <link rel="stylesheet" href="Styles/filesharing.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
    <body>
    <header>
        <div class="waveanimheader" onclick="location.reload()" >
        <span class="f">F</span>
        <span class="i">I</span>
        <span class="l">L</span>
        <span class="e">E</span>
        <span class="s">S</span>
        <span class="h">H</span>
        <span class="a">A</span>
        <span class="r">R</span>
        <span class="i2">I</span>
        <span class="n">N</span>
        <span class="g">G</span>    
    </div>
    <div class="nav">
        <a class="qrcodegeneratortag" href="qrcodegenerator.html">QR CODE GENERATOR</a>
    </div>
</header>
<main>
    <h1 class="flicker">Share File</h1>
    <div class="upload-box">
        <span class="info">Share Files Privately</span>
        <form>
            <label for="fileInput" class="submituploadbtn">
                Choose File <i class="fa-solid fa-folder-open"></i>
            </label>
            <input type="file" id="fileInput" name="file" required>
            <button type="submit" class="submituploadbtn">Upload <i class="fa-solid fa-upload"></i></button>
        </form>
        <span class="imageinfo" id="imagename"></span>
    </div>
    <h1 class="flicker">Download File</h1>
        <div class="download-box">
            <span class="downloadindicator">Download ready <i class="fa-solid fa-arrow-right"></i></span>
            <a href="#">file_name.zip</a>
            <div class="copy-download-link">
                <button class="copy-btn" id="copyBtn">Copy Link <i class="fa-solid fa-copy"></i></button>
            </div>
            <span id="timer" class="timerspan">00:00</span>
            <div class="delete-share">
                <button class="delete-btn">Delete Share <i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
</main> 
</body>
<script type="module" src="Js/main.js"></script>
</html>
