<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Sharing</title>
    <link rel="stylesheet" href="Styles/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /></head>
    <header>
        <div class="waveanimheader">
        <span class="f">F</span>
        <span class="i">I</span>
        <span class="l">L</span>
        <span class="e">E</span>
        <span class="s">S</span>
        <span class="h">H</span>
        <span class="a">A</span>
        <span class="r">R</span>
        <span class="i2">I</span>
        <span class="n">N</span>
        <span class="g">G</span>
    </div>
</header>
<body>
<main>
    <h1 id="flicker">Upload File</h1>
    <div class="upload-box">
        <span class="info">Upload Files Privately</span>
        <form>
            <input type="file" name="file" required>
            <button type="submit" class="submituploadbtn">Upload <i class="fa-solid fa-upload"></i></button>
        </form>
    </div>
    <h1 id="flicker">Download File</h1>
        <div class="download-box">
            <span>Download ready <i class="fa-solid fa-arrow-right"></i></span>
            <a href="#">file_name.zip</a>
        </div>
</main> 
</body>
<script type="module" src="Js/main.js"></script>
</html>
